name: Publish faker2 to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        required: true
        default: testpypi
        type: choice
        options: [testpypi, pypi]

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine
      - name: Run the test suite
        run: |
          python -m pip install -e .
          python -m pip install pytest pytest-mock validators freezegun
          python -m pytest tests -q
      - name: Build sdist + wheel
        run: python -m build
      - name: Check metadata
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Trusted Publishing: no API token needed, PyPI verifies this workflow +
    # environment via OIDC. Configure the publisher on PyPI with:
    #   owner: jqueguiner / repo: faker2 / workflow: publish.yml / environment: pypi
    environment:
      name: pypi
      url: https://pypi.org/p/faker2
    permissions:
      id-token: write
    if: github.event_name == 'release' || inputs.target == 'pypi'
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/faker2
    permissions:
      id-token: write
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
