name: Rust release binaries

# Build the `faker2` Rust CLI for every platform and attach the archives to the
# GitHub Release. Triggers on a version tag (e.g. `v0.1.0`) or manually.
#
# The released binary uses the crate's default features (zero-dependency core +
# bundled-locale providers); it does NOT bundle the parquet dataset, so it stays
# small and self-contained. For the data-backed `real-names` feature, build from
# source with `--features real-names`.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/release to upload assets to (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  # Fail fast if the release tag does not match rust/Cargo.toml's version.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Tag matches Cargo.toml version
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          tag="${tag#v}"
          ver=$(grep -m1 '^version' rust/Cargo.toml | cut -d'"' -f2)
          echo "tag=$tag  Cargo.toml=$ver"
          if [ "$tag" != "$ver" ]; then
            echo "::error::release tag v$tag != rust/Cargo.toml version $ver — bump the crate version"
            exit 1
          fi

  build:
    needs: verify
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest   # Apple Silicon runner cross-builds the Intel target
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Publish binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: faker2
          target: ${{ matrix.target }}
          manifest-path: rust/Cargo.toml
          archive: faker2-$tag-$target
          # tar.gz for unix, zip for windows (default handling)
          checksum: sha256
          ref: refs/tags/${{ github.event.inputs.tag || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
